  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {

    .input-field:focus { outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 20px rgba(0,217,255,0.3); }
    
    .slider-container { position: relative; padding: 8px 0; }

    .slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); cursor: pointer; border: 2px solid var(--bg-primary); box-shadow: 0 0 8px rgba(0,217,255,0.4); }

    .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
    
    .data-list { max-height: 150px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-tertiary); }
    .data-item { display: flex; flex-direction: column; gap: 2px; padding: 8px 12px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 11px; }

    .data-item-coords { color: var(--text-secondary); font-size: 10px; word-break: break-all; }
    .data-item-delete { background: none; border: none; color: var(--accent-red); cursor: pointer; font-size: 14px; padding: 2px 6px; }
    .data-item-delete:hover { background: rgba(255,71,87,0.2); border-radius: 4px; }
    
    .canvas-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 8px; flex-wrap: wrap; }
    .toolbar-group { display: flex; align-items: center; gap: 8px; }
    .canvas-wrapper { flex: 1; position: relative; overflow: hidden; background: var(--bg-primary); }
    #canvas { position: absolute; top: 0; left: 0; touch-action: none; }

    .checkbox-input { width: 16px; height: 16px; accent-color: var(--accent-cyan); }
    
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg-secondary); border: 1px solid var(--accent-green); color: var(--accent-green); padding: 12px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 4px 20px rgba(0,255,136,0.2); z-index: 1000; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    
    .legend { position: absolute; bottom: 16px; right: 16px; background: rgba(17,24,32,0.95); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-size: 11px; backdrop-filter: blur(8px); }

    .mode-indicator { position: absolute; top: 16px; left: 16px; background: rgba(255,107,53,0.9); border: 1px solid var(--accent-orange); border-radius: 6px; padding: 10px 14px; font-size: 12px; color: white; backdrop-filter: blur(8px); display: flex; align-items: center; gap: 8px; font-weight: 500; }

    .modal-title { font-size: 16px; font-weight: 600; }

    .modal-body { padding: 20px; }
    .help-section { margin-bottom: 16px; }
    .help-section h4 { font-size: 13px; font-weight: 600; color: var(--accent-cyan); margin-bottom: 8px; }
    .help-section p, .help-section li { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }

    .help-section code { background: var(--bg-primary); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent-green); }
    
    .summary-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .summary-title { font-size: 12px; font-weight: 600; color: var(--accent-cyan); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .summary-item { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; }
    .summary-label { color: var(--text-muted); }
    .summary-value { color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }
    .terrain-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; }
    .terrain-flat { background: rgba(0,255,136,0.2); color: var(--accent-green); }
    .terrain-gentle { background: rgba(0,217,255,0.2); color: var(--accent-cyan); }
    .terrain-moderate { background: rgba(255,217,61,0.2); color: var(--accent-yellow); }
    .terrain-steep { background: rgba(255,107,53,0.2); color: var(--accent-orange); }
    .terrain-extreme { background: rgba(255,71,87,0.2); color: var(--accent-red); }
    
    .chart-container { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 12px; min-height: 220px; position: relative; }
    .chart-title { font-size: 12px; font-weight: 600; color: var(--accent-cyan); margin-bottom: 8px; }
    .chart-expand { position: absolute; top: 8px; right: 8px; background: none; border: none; color: var(--accent-cyan); cursor: pointer; font-size: 18px; padding: 2px 6px; opacity: 0.7; transition: all 0.2s; border-radius: 4px; }
    .chart-expand:hover { opacity: 1; background: rgba(0,217,255,0.15); transform: scale(1.1); }
    
    /* Anime.js Visualizations */
    .terrain-visualization { background: linear-gradient(135deg, var(--bg-tertiary) 0%, rgba(0,217,255,0.03) 100%); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; position: relative; }
    .terrain-viz-title { font-size: 12px; font-weight: 600; color: var(--accent-purple); margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    
    /* TIN Construction Canvas */
    .tin-canvas { width: 100%; height: 280px; background: var(--bg-secondary); border-radius: 6px; border: 1px solid var(--border); position: relative; overflow: hidden; }
    .tin-canvas.expanded { height: 400px; }
    .tin-canvas .point { position: absolute; width: 10px; height: 10px; background: var(--accent-cyan); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(0,217,255,0.7); z-index: 3; }
    .tin-canvas .triangle { position: absolute; background: rgba(168, 85, 247, 0.15); border: 1px solid rgba(168, 85, 247, 0.5); pointer-events: none; z-index: 1; }
    .tin-canvas .edge { position: absolute; height: 3px; background: linear-gradient(90deg, var(--accent-orange), var(--accent-red)); transform-origin: left center; z-index: 2; box-shadow: 0 0 6px rgba(255,107,53,0.4); }
    .tin-legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; font-size: 10px; color: var(--text-muted); justify-content: center; }
    .tin-legend-item { display: flex; align-items: center; gap: 4px; }
    .tin-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .tin-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }

    .tin-stat-value { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-bottom: 2px; }
    .tin-stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }
    .tin-controls { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; }
    .tin-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-tertiary); color: var(--text-secondary); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 4px; }
    .tin-btn:hover { background: var(--border); color: var(--text-primary); }
    .tin-btn.active { background: var(--accent-purple); color: white; border-color: var(--accent-purple); }
    .tin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    @media (max-width: 768px) {
      .tin-canvas { height: 220px; }
      .tin-point { width: 6px; height: 6px; }
      .tin-stats { grid-template-columns: repeat(3, 1fr); gap: 6px; }
      .tin-stat-value { font-size: 16px; }
      .tin-stat-label { font-size: 8px; }
    }
    
    .chart-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 300; backdrop-filter: blur(4px); }

    .offline-modal { max-width: 480px; }

    // Boot loader - tracks script loading progress
    const bootState = { progress: 0, errors: [] };
    const CIRCLE_CIRCUMFERENCE = 339.292; // 2 * PI * 54 (radius)
    
    function updateBootProgress(percent, status) {
      const ring = document.getElementById('boot-progress-ring');
      const percentEl = document.getElementById('boot-progress-percent');
      const statusEl = document.getElementById('boot-status');
      
      if (ring) {
        const offset = CIRCLE_CIRCUMFERENCE - (percent / 100) * CIRCLE_CIRCUMFERENCE;
        ring.style.strokeDashoffset = offset;
      }
      if (percentEl) percentEl.textContent = Math.round(percent) + '%';
      if (statusEl) statusEl.textContent = status;
    }
    
    function updateBootStep(stepId, state) {
      const stepEl = document.getElementById('step-' + stepId);
      if (!stepEl) return;
      stepEl.className = 'boot-step ' + state;
      const iconEl = stepEl.querySelector('.boot-step-icon');
      if (iconEl) {
        if (state === 'done') iconEl.textContent = '✓';
        else if (state === 'loading') iconEl.textContent = '◌';
        else if (state === 'error') iconEl.textContent = '✕';
      }
    }
    
    function showBootError(message, details) {
      window.bootFailed = true; // Flag to prevent app initialization
      const errorEl = document.getElementById('boot-error');
      if (errorEl) {
        errorEl.innerHTML = '<div class="boot-error"><div class="boot-error-title">⚠ Loading Error</div><div class="boot-error-message">' + message + '</div>' + (details ? '<div class="boot-error-details">' + details + '</div>' : '') + '<div style="font-size:11px;color:var(--text-muted);">Try: 1) Check internet  2) Disable ad-blocker  3) Use offline version</div><button class="boot-retry-btn" onclick="location.reload()">Retry</button></div>';
        errorEl.style.display = 'block';
      }

    // Track library loading - app won't start until all are true
    window.libsReady = { react: false, reactdom: false, babel: false, xlsx: false, highcharts: false };
    
    function markLibReady(lib) {
      window.libsReady[lib] = true;
      checkAllReady();
    }
    
    function checkAllReady() {
      if (window.bootFailed) return;
      const all = Object.values(window.libsReady).every(v => v);
      if (all) {
        window.allLibsReady = true;
        // Signal that app can initialize
        if (window.initAppWhenReady) window.initAppWhenReady();
      }
    }
    
    // Fallback loader for SheetJS
    function loadSheetJSFallback() {
      const fallbackURLs = [
        'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
        'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js'
      ];
      let fallbackIndex = 0;
      
      function tryNext() {
        if (fallbackIndex >= fallbackURLs.length) {
          updateBootStep('xlsx', 'error');
          showBootError('Failed to load SheetJS', 'All CDNs unreachable. Try offline version.');
          return;
        }
        const script = document.createElement('script');
        script.src = fallbackURLs[fallbackIndex];
        script.onload = function() {
          markLibReady('xlsx');
          updateBootStep('xlsx', 'done');
          updateBootProgress(75, 'Loading Highcharts...');
          updateBootStep('highcharts', 'loading');
          // Only load highcharts if not already loading/loaded
          if (!window.libsReady.highcharts && !window.highchartsLoading) {
            window.highchartsLoading = true;
            loadHighchartsWithFallback();
          }
        };
        script.onerror = function() {
          fallbackIndex++;
          tryNext();
        };
        document.head.appendChild(script);
      }
      tryNext();
    }
    
    function loadHighchartsWithFallback() {
      const script = document.createElement('script');
      script.src = 'https://code.highcharts.com/highcharts.js';
      script.onload = function() {
        markLibReady('highcharts');
        updateBootStep('highcharts', 'done');
        updateBootProgress(85, 'Loading Anime.js...');
        updateBootStep('anime', 'loading');
      };
      script.onerror = function() {
        // Try jsdelivr fallback
        const fallback = document.createElement('script');
        fallback.src = 'https://cdn.jsdelivr.net/npm/highcharts@11.4.8/highcharts.min.js';
        fallback.onload = function() {
          markLibReady('highcharts');
          updateBootStep('highcharts', 'done');
          updateBootProgress(85, 'Loading Anime.js...');
          updateBootStep('anime', 'loading');
        };
        fallback.onerror = function() {
          updateBootStep('highcharts', 'error');
          showBootError('Failed to load Highcharts', 'CDN unreachable');
        };
        document.head.appendChild(fallback);
      };
      document.head.appendChild(script);
    }
    
    function loadAnimeWithFallback() {
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/animejs@3.2.1/lib/anime.min.js';
      script.onload = function() {
        markLibReady('anime');
        updateBootStep('anime', 'done');
        updateBootProgress(95, 'Starting application...');
        updateBootStep('app', 'loading');
      };
      script.onerror = function() {
        updateBootStep('anime', 'error');
        showBootError('Failed to load Anime.js', 'CDN unreachable - animations disabled');
        // Continue without anime - it's not critical
        updateBootProgress(95, 'Starting application...');
        updateBootStep('app', 'loading');
      };
      document.head.appendChild(script);
    }
    
    function hideBootScreen() {
      const bootScreen = document.getElementById('boot-screen');
      if (bootScreen) bootScreen.classList.add('hidden');
    }
    
    // Track script loading
    updateBootProgress(5, 'Loading React...');
    updateBootStep('react', 'loading');

      static triangulate(points) {

        const dmax = Math.max(dx, dy) * 3;

        const superTri = [
          { x: midX - dmax * 2, y: midY - dmax, z: 0, isSuper: true },
          { x: midX + dmax * 2, y: midY - dmax, z: 0, isSuper: true },
          { x: midX, y: midY + dmax * 2, z: 0, isSuper: true }

        let triangles = [{ p1: superTri[0], p2: superTri[1], p3: superTri[2] }];

              { a: tri.p2, b: tri.p3 },
              { a: tri.p3, b: tri.p1 }

    }
    
    function hasEdge(tri, a, b) {
      return (tri.p1 === a && tri.p2 === b) || (tri.p2 === a && tri.p1 === b) ||
             (tri.p2 === a && tri.p3 === b) || (tri.p3 === a && tri.p2 === b) ||
             (tri.p3 === a && tri.p1 === b) || (tri.p1 === a && tri.p3 === b);
    }
    
    // Catmull-Rom Spline Smoothing for OPEN curves (no closing endpoints)
    function smoothContour(points, smoothness) {
      if (smoothness === 0 || points.length < 3) return points;
      
      const segments = Math.max(2, Math.floor(smoothness * 2));
      const result = [];
      
      // For open curves, we extend the endpoints to create phantom control points
      const extended = [
        // Phantom point before first: reflect first segment
        { x: 2 * points[0].x - points[1].x, y: 2 * points[0].y - points[1].y },
        ...points,
        // Phantom point after last: reflect last segment
        { x: 2 * points[points.length - 1].x - points[points.length - 2].x, 
          y: 2 * points[points.length - 1].y - points[points.length - 2].y }
      ];
      
      // Process from index 1 to length-2 (skipping phantom points)
      for (let i = 1; i < extended.length - 2; i++) {
        const p0 = extended[i - 1];
        const p1 = extended[i];
        const p2 = extended[i + 1];
        const p3 = extended[i + 2];
        
        for (let t = 0; t < 1; t += 1 / segments) {
          const t2 = t * t;
          const t3 = t2 * t;
          
          const x = 0.5 * (
            (2 * p1.x) +
            (-p0.x + p2.x) * t +
            (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
            (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3
          );
          
          const y = 0.5 * (
            (2 * p1.y) +
            (-p0.y + p2.y) * t +
            (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
            (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3
          );
          
          result.push({ x, y });
        }
      }
      
      // Add the final point
      result.push({ ...points[points.length - 1] });
      
      return result;
    }
    
    // Contour Generation
    function generateContours(triangles, interval, majorEvery, smoothness = 0) {
      if (triangles.length === 0) return [];
      
      const allZ = triangles.flatMap(t => [t.p1.z, t.p2.z, t.p3.z]);
      const minZ = Math.min(...allZ), maxZ = Math.max(...allZ);
      const startLevel = Math.ceil(minZ / interval) * interval;
      const endLevel = Math.floor(maxZ / interval) * interval;
      const contours = [];
      
      for (let level = startLevel; level <= endLevel; level += interval) {
        const segments = [];
        
        for (const tri of triangles) {
          const pts = [tri.p1, tri.p2, tri.p3];
          const crossings = [];
          
          for (let i = 0; i < 3; i++) {
            const p1 = pts[i], p2 = pts[(i + 1) % 3];
            if ((p1.z < level && p2.z >= level) || (p2.z < level && p1.z >= level)) {
              const t = (level - p1.z) / (p2.z - p1.z);
              crossings.push({
                x: p1.x + t * (p2.x - p1.x),
                y: p1.y + t * (p2.y - p1.y)
              });
            }
          }
          
          if (crossings.length === 2) segments.push(crossings);
        }
        
        if (segments.length > 0) {
          const chains = buildChains(segments);
          const isMajor = Math.abs(Math.round(level / interval) % majorEvery) === 0;
          for (const chain of chains) {
            const smoothed = smoothness > 0 ? smoothContour(chain, smoothness) : chain;
            contours.push({ level, points: smoothed, isMajor });
          }
        }
      }
      
      return contours;
    }
    
    function buildChains(segments) {
      const chains = [];
      const used = new Set();
      
      for (let i = 0; i < segments.length; i++) {
        if (used.has(i)) continue;
        
        const chain = [...segments[i]];
        used.add(i);
        
        let extended = true;
        while (extended) {
          extended = false;
          const lastPt = chain[chain.length - 1];
          const firstPt = chain[0];
          
          for (let j = 0; j < segments.length; j++) {
            if (used.has(j)) continue;
            const seg = segments[j];
            
            if (dist(lastPt, seg[0]) < 0.01) {
              chain.push(seg[1]); used.add(j); extended = true; break;
            } else if (dist(lastPt, seg[1]) < 0.01) {
              chain.push(seg[0]); used.add(j); extended = true; break;
            } else if (dist(firstPt, seg[0]) < 0.01) {
              chain.unshift(seg[1]); used.add(j); extended = true; break;
            } else if (dist(firstPt, seg[1]) < 0.01) {
              chain.unshift(seg[0]); used.add(j); extended = true; break;
            }
          }
        }
        
        if (chain.length >= 2) chains.push(chain);
      }
      
      return chains;
    }
    
    function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
    
    // Terrain Stats
    function getTerrainStats(points, triangles) {
      if (points.length === 0) return null;
      
      const allZ = points.map(p => p.z);
      const minZ = Math.min(...allZ), maxZ = Math.max(...allZ);
      const avgZ = allZ.reduce((a, b) => a + b, 0) / allZ.length;
      
      let totalArea = 0;
      const slopes = [];
      const slopeDistribution = { flat: 0, gentle: 0, moderate: 0, steep: 0, extreme: 0 };
      
      for (const tri of triangles) {
        const ax = tri.p1.x, ay = tri.p1.y;
        const bx = tri.p2.x, by = tri.p2.y;
        const cx = tri.p3.x, cy = tri.p3.y;
        
        const area = Math.abs((ax * (by - cy) + bx * (cy - ay) + cx * (ay - by)) / 2);
        totalArea += area;
        
        const dx1 = bx - ax, dy1 = by - ay, dz1 = tri.p2.z - tri.p1.z;
        const dx2 = cx - ax, dy2 = cy - ay, dz2 = tri.p3.z - tri.p1.z;
        const dist1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
        const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
        const slope = Math.max(dist1 > 0 ? Math.abs(dz1 / dist1) : 0, dist2 > 0 ? Math.abs(dz2 / dist2) : 0);
        slopes.push(slope);
        
        const slopeDeg = Math.atan(slope) * (180 / Math.PI);
        if (slopeDeg < 5) slopeDistribution.flat++;
        else if (slopeDeg < 15) slopeDistribution.gentle++;
        else if (slopeDeg < 30) slopeDistribution.moderate++;
        else if (slopeDeg < 45) slopeDistribution.steep++;
        else slopeDistribution.extreme++;
      }
      
      const avgSlope = slopes.length > 0 ? slopes.reduce((a, b) => a + b, 0) / slopes.length : 0;
      const maxSlope = slopes.length > 0 ? Math.max(...slopes) : 0;
      const avgSlopeDeg = Math.atan(avgSlope) * (180 / Math.PI);
      const maxSlopeDeg = Math.atan(maxSlope) * (180 / Math.PI);
      
      let terrainType = 'flat';
      if (avgSlopeDeg > 15) terrainType = 'extreme';
      else if (avgSlopeDeg > 10) terrainType = 'steep';
      else if (avgSlopeDeg > 5) terrainType = 'moderate';
      else if (avgSlopeDeg > 2) terrainType = 'gentle';
      
      return {
        area: totalArea,
        pointCount: points.length,
        triangleCount: triangles.length,
        elevation: { min: minZ, max: maxZ, avg: avgZ, range: maxZ - minZ },
        slope: { avgDeg: avgSlopeDeg, maxDeg: maxSlopeDeg },
        slopeDistribution,
        terrainType
      };
    }
    
    // Smart AI Summary Generator - Rule-based terrain intelligence (works offline)
    function generateSmartSummary(stats, points, breakLines, contours) {
      if (!stats) return null;
      
      const { area, pointCount, triangleCount, elevation, slope, slopeDistribution, terrainType } = stats;
      
      // Analyze data density
      const density = pointCount / (area || 1) * 10000; // points per 10000 m²
      let densityAssessment = '';
      if (density > 10) densityAssessment = 'high-density survey with excellent spatial resolution';
      else if (density > 5) densityAssessment = 'well-distributed survey points providing good coverage';
      else if (density > 2) densityAssessment = 'moderate point density suitable for general mapping';
      else densityAssessment = 'sparse survey coverage - consider additional data points for critical areas';
      
      // Analyze elevation characteristics
      const reliefRatio = elevation.range / Math.sqrt(area || 1);
      let reliefDesc = '';
      if (reliefRatio > 0.1) reliefDesc = 'significant vertical relief relative to survey extent';
      else if (reliefRatio > 0.05) reliefDesc = 'moderate topographic variation';
      else reliefDesc = 'relatively uniform elevation profile';
      
      // Slope risk assessment
      const steepPercent = ((slopeDistribution.steep + slopeDistribution.extreme) / triangleCount * 100) || 0;
      let slopeRisk = '';
      let recommendations = [];
      
      if (steepPercent > 30) {
        slopeRisk = 'High erosion and stability risk identified';
        recommendations.push('geotechnical assessment recommended');
        recommendations.push('erosion control measures advised');
      } else if (steepPercent > 15) {
        slopeRisk = 'Moderate slope concerns in localized areas';
        recommendations.push('drainage planning recommended');
      } else if (steepPercent > 5) {
        slopeRisk = 'Minor steep zones detected';
        recommendations.push('standard grading practices sufficient');
      } else {
        slopeRisk = 'Favorable slope conditions throughout';
        recommendations.push('minimal earthwork expected');
      }
      
      // Construction suitability
      let suitability = '';
      if (terrainType === 'flat' || terrainType === 'gentle') {
        suitability = 'excellent for most construction activities';
        if (elevation.range < 2) recommendations.push('verify drainage gradient adequacy');
      } else if (terrainType === 'moderate') {
        suitability = 'suitable with standard site preparation';
        recommendations.push('cut-fill balancing analysis recommended');
      } else {
        suitability = 'challenging terrain requiring specialized engineering';
        recommendations.push('retaining structures may be required');
        recommendations.push('phased development approach suggested');
      }
      
      // Contour quality assessment
      const contourDensity = contours.length / (elevation.range || 1);
      let contourNote = '';
      if (contourDensity > 5) contourNote = 'Dense contour coverage enables detailed grading design.';
      else if (contourDensity > 2) contourNote = 'Adequate contour definition for planning purposes.';
      else contourNote = 'Consider finer contour interval for detailed design work.';
      
      // Breakline assessment
      let breaklineNote = '';
      if (breakLines.length > 0) {
        breaklineNote = `${breakLines.length} breakline(s) incorporated to accurately model terrain discontinuities.`;
      }
      
      // Generate intelligent summary paragraphs
      const para1 = `This ${terrainType} terrain survey encompasses ${area.toFixed(0).toLocaleString()} m² with ${pointCount} survey points representing ${densityAssessment}. The triangulated surface model comprises ${triangleCount} facets, providing ${reliefDesc} across the study area.`;
      
      const para2 = `Elevation analysis reveals a ${elevation.range.toFixed(2)}m vertical range from ${elevation.min.toFixed(2)}m to ${elevation.max.toFixed(2)}m (mean: ${elevation.avg.toFixed(2)}m). The average terrain slope of ${slope.avgDeg.toFixed(1)}° with maximum gradients reaching ${slope.maxDeg.toFixed(1)}° indicates the site is ${suitability}.`;
      
      const para3 = `Slope distribution analysis: ${slopeDistribution.flat} flat, ${slopeDistribution.gentle} gentle, ${slopeDistribution.moderate} moderate, ${slopeDistribution.steep} steep, and ${slopeDistribution.extreme} extreme zones identified. ${slopeRisk}.`;
      
      const para4 = `${contourNote} ${breaklineNote}`.trim();
      
      const para5 = recommendations.length > 0 
        ? `Recommendations: ${recommendations.join('; ')}.`
        : 'No specific concerns identified - site conditions favorable for development.';
      
      return { para1, para2, para3, para4, para5, recommendations, suitability, slopeRisk };
    }
    
    // DXF Builder - Ultra-simple R12 format (maximum compatibility)
    // R12 format doesn't require handles, subclass markers, or complex table structures
    function buildDXF(contours, breakLines, points, version = 'AC1009') {
      let dxf = '';
      
      // HEADER Section - Minimal R12 header
      dxf += '0\nSECTION\n2\nHEADER\n';
      dxf += '9\n$ACADVER\n1\nAC1009\n'; // R12 format - most compatible
      dxf += '9\n$INSUNITS\n70\n6\n'; // Meters
      dxf += '9\n$EXTMIN\n10\n0.0\n20\n0.0\n30\n0.0\n';
      dxf += '9\n$EXTMAX\n10\n1000000.0\n20\n1000000.0\n30\n10000.0\n';
      dxf += '0\nENDSEC\n';
      
      // TABLES Section - Minimal tables for R12
      dxf += '0\nSECTION\n2\nTABLES\n';
      
      // LTYPE Table
      dxf += '0\nTABLE\n2\nLTYPE\n70\n1\n';
      dxf += '0\nLTYPE\n2\nCONTINUOUS\n70\n0\n3\nSolid line\n72\n65\n73\n0\n40\n0.0\n';
      dxf += '0\nENDTAB\n';
      
      // LAYER Table
      dxf += '0\nTABLE\n2\nLAYER\n70\n6\n';
      dxf += '0\nLAYER\n2\n0\n70\n0\n62\n7\n6\nCONTINUOUS\n';
      dxf += '0\nLAYER\n2\nContours-Minor\n70\n0\n62\n3\n6\nCONTINUOUS\n'; // Green
      dxf += '0\nLAYER\n2\nContours-Major\n70\n0\n62\n1\n6\nCONTINUOUS\n'; // Red
      dxf += '0\nLAYER\n2\nContour-Labels\n70\n0\n62\n2\n6\nCONTINUOUS\n'; // Yellow
      dxf += '0\nLAYER\n2\nBreaklines\n70\n0\n62\n6\n6\nCONTINUOUS\n'; // Magenta
      dxf += '0\nLAYER\n2\nSurvey-Points\n70\n0\n62\n4\n6\nCONTINUOUS\n'; // Cyan
      dxf += '0\nENDTAB\n';
      
      // STYLE Table
      dxf += '0\nTABLE\n2\nSTYLE\n70\n1\n';
      dxf += '0\nSTYLE\n2\nSTANDARD\n70\n0\n40\n0.0\n41\n1.0\n50\n0.0\n71\n0\n42\n2.5\n3\ntxt\n4\n\n';
      dxf += '0\nENDTAB\n';
      
      dxf += '0\nENDSEC\n';
      
      // BLOCKS Section - Empty but required
      dxf += '0\nSECTION\n2\nBLOCKS\n';
      dxf += '0\nENDSEC\n';
      
      // ENTITIES Section
      dxf += '0\nSECTION\n2\nENTITIES\n';
      
      // Contours as simple POLYLINE entities
      for (const c of contours) {
        const layer = c.isMajor ? 'Contours-Major' : 'Contours-Minor';
        
        // POLYLINE header
        dxf += '0\nPOLYLINE\n8\n' + layer + '\n66\n1\n70\n8\n'; // 70=8 means 3D polyline
        dxf += '10\n0.0\n20\n0.0\n30\n' + c.level.toFixed(3) + '\n';
        
        // Vertices
        for (const p of c.points) {
          dxf += '0\nVERTEX\n8\n' + layer + '\n';
          dxf += '10\n' + p.x.toFixed(3) + '\n20\n' + p.y.toFixed(3) + '\n30\n' + c.level.toFixed(3) + '\n';
          dxf += '70\n32\n'; // 32 = 3D polyline vertex
        }
        
        // SEQEND
        dxf += '0\nSEQEND\n8\n' + layer + '\n';
        
        // Add label text at middle of contour
        if (c.points.length >= 3) {
          const midIdx = Math.floor(c.points.length / 2);
          const mid = c.points[midIdx];
          
          // Calculate angle for text rotation
          let angle = 0;
          if (midIdx > 0 && midIdx < c.points.length - 1) {
            const prev = c.points[midIdx - 1];
            const next = c.points[midIdx + 1];
            angle = Math.atan2(next.y - prev.y, next.x - prev.x) * (180 / Math.PI);
          }
          
          // TEXT entity
          dxf += '0\nTEXT\n8\nContour-Labels\n';
          dxf += '10\n' + mid.x.toFixed(3) + '\n20\n' + mid.y.toFixed(3) + '\n30\n' + c.level.toFixed(3) + '\n';
          dxf += '40\n2.0\n'; // Text height
          dxf += '1\n' + c.level.toFixed(1) + '\n'; // Text content
          dxf += '50\n' + angle.toFixed(1) + '\n'; // Rotation
        }
      }
      
      // Breaklines as 3D POLYLINE
      for (const bl of breakLines) {
        dxf += '0\nPOLYLINE\n8\nBreaklines\n66\n1\n70\n8\n';
        dxf += '10\n0.0\n20\n0.0\n30\n0.0\n';
        
        for (const p of bl.points) {
          dxf += '0\nVERTEX\n8\nBreaklines\n';
          dxf += '10\n' + p.x.toFixed(3) + '\n20\n' + p.y.toFixed(3) + '\n30\n' + p.z.toFixed(3) + '\n';
          dxf += '70\n32\n';
        }
        
        dxf += '0\nSEQEND\n8\nBreaklines\n';
      }
      
      // Survey points as POINT entities with labels
      for (const pt of points) {
        // POINT entity
        dxf += '0\nPOINT\n8\nSurvey-Points\n';
        dxf += '10\n' + pt.x.toFixed(3) + '\n20\n' + pt.y.toFixed(3) + '\n30\n' + pt.z.toFixed(3) + '\n';
        
        // Label TEXT
        dxf += '0\nTEXT\n8\nSurvey-Points\n';
        dxf += '10\n' + (pt.x + 1).toFixed(3) + '\n20\n' + (pt.y + 1).toFixed(3) + '\n30\n' + pt.z.toFixed(3) + '\n';
        dxf += '40\n1.5\n'; // Text height
        dxf += '1\n' + pt.borehole + ' RL' + pt.z.toFixed(2) + '\n';
      }
      
      dxf += '0\nENDSEC\n';
      dxf += '0\nEOF\n';
      
      return dxf;
    }

        }
        lisp += ' "")\n';
      }
      lisp += '  (princ (strcat "\\n" (itoa ' + breakLines.length + ') " breaklines imported."))\n';
      lisp += ')\n\n';
      
      // Main import function
      lisp += '(defun C:IMPORT-ALL ()\n';
      lisp += '  (CREATE-LAYERS)\n';

    // TIN Construction Visualizer Component - Proper implementation with scoped animations
    function TINVisualizer({ points, triangles, breakLines, isExpanded = false, onExpand = null }) {
      const canvasRef = React.useRef(null);
      const [animationState, setAnimationState] = React.useState('idle'); // idle, playing, complete
      const [animationInstances, setAnimationInstances] = React.useState([]);
      const instanceId = React.useRef(`tin-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`);
      
      // Clean up animations
      const cleanupAnimations = React.useCallback(() => {
        animationInstances.forEach(anim => {
          if (anim && typeof anim.pause === 'function') {
            anim.pause();
          }
        });
        setAnimationInstances([]);
      }, [animationInstances]);
      
      // Build the visualization elements
      const buildVisualization = React.useCallback((forAnimation = false) => {
        const canvas = canvasRef.current;
        if (!canvas || !points.length) return;
        
        canvas.innerHTML = '';
        const width = canvas.offsetWidth;
        const height = canvas.offsetHeight;
        const padding = isExpanded ? 40 : 30;
        
        // Calculate bounds from ALL points
        const minX = Math.min(...points.map(p => p.x));
        const maxX = Math.max(...points.map(p => p.x));
        const minY = Math.min(...points.map(p => p.y));
        const maxY = Math.max(...points.map(p => p.y));
        const rangeX = maxX - minX || 1;
        const rangeY = maxY - minY || 1;
        
        // Scale function
        const scaleVal = Math.min((width - 2*padding) / rangeX, (height - 2*padding) / rangeY);
        const toCanvasX = (x) => padding + (x - minX) * scaleVal;
        const toCanvasY = (y) => height - (padding + (y - minY) * scaleVal);
        
        // Show ALL triangles - no sampling
        const sampledTriangles = triangles;
        
        // Create single SVG for all triangles
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.style.cssText = `position: absolute; left: 0; top: 0; width: 100%; height: 100%; pointer-events: none;`;
        
        // Add each triangle as a polygon
        sampledTriangles.forEach((tri, idx) => {
          const x1 = toCanvasX(tri.p1.x);
          const y1 = toCanvasY(tri.p1.y);
          const x2 = toCanvasX(tri.p2.x);
          const y2 = toCanvasY(tri.p2.y);
          const x3 = toCanvasX(tri.p3.x);
          const y3 = toCanvasY(tri.p3.y);
          
          const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
          polygon.setAttribute('class', 'triangle');
          polygon.setAttribute('points', `${x1},${y1} ${x2},${y2} ${x3},${y3}`);
          polygon.setAttribute('fill', 'rgba(168, 85, 247, 0.08)');
          polygon.setAttribute('stroke', 'rgba(168, 85, 247, 0.6)');
          polygon.setAttribute('stroke-width', '1');
          polygon.style.opacity = forAnimation ? '0' : '1';
          svg.appendChild(polygon);
        });
        
        canvas.appendChild(svg);
        
        // Create breakline edges - render directly from breakline coordinates
        // breakLines structure is: [{ name, points: [{x,y,z}, ...] }, ...]
        let edgeCount = 0;
        breakLines.forEach((breakline) => {
          const linePoints = breakline.points || breakline; // Handle both formats
          if (!linePoints || linePoints.length < 2) return;
          
          for (let j = 0; j < linePoints.length - 1; j++) {
            const pt1 = linePoints[j];
            const pt2 = linePoints[j + 1];
            if (!pt1 || !pt2) continue;
            
            const x1 = toCanvasX(pt1.x);
            const y1 = toCanvasY(pt1.y);
            const x2 = toCanvasX(pt2.x);
            const y2 = toCanvasY(pt2.y);
            
            const dx = x2 - x1;
            const dy = y2 - y1;
            const length = Math.sqrt(dx * dx + dy * dy);
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;
            
            if (length > 0) {
              const el = document.createElement('div');
              el.className = 'edge';
              const scaleX = forAnimation ? 'scaleX(0)' : 'scaleX(1)';
              el.style.cssText = `position: absolute; left: ${x1}px; top: ${y1}px; width: ${length}px; height: 3px; background: linear-gradient(90deg, #ff6b35, #ff4757); transform-origin: left center; transform: rotate(${angle}deg) ${scaleX}; opacity: ${forAnimation ? '0' : '1'}; z-index: 2; box-shadow: 0 0 8px rgba(255,107,53,0.6);`;
              canvas.appendChild(el);
              edgeCount++;
            }
          }
        });
        
        // Sample points for display
        const maxPoints = isExpanded ? 25 : 18;
        const ptStep = Math.max(1, Math.floor(points.length / maxPoints));
        const sampledPoints = points.filter((_, i) => i % ptStep === 0).slice(0, maxPoints);
        
        // Create point elements (foreground)
        sampledPoints.forEach((p) => {
          const cx = toCanvasX(p.x);
          const cy = toCanvasY(p.y);
          const el = document.createElement('div');
          el.className = 'point';
          const scale = forAnimation ? 'scale(0)' : 'scale(1)';
          el.style.cssText = `position: absolute; left: ${cx}px; top: ${cy}px; width: 10px; height: 10px; background: #00d9ff; border-radius: 50%; transform: translate(-50%, -50%) ${scale}; box-shadow: 0 0 10px rgba(0,217,255,0.7); z-index: 3; opacity: ${forAnimation ? '0' : '1'};`;
          canvas.appendChild(el);
        });
        
        return { canvas, pointCount: sampledPoints.length, triangleCount: sampledTriangles.length, edgeCount };
      }, [points, triangles, breakLines, isExpanded]);
      
      // Play the animation
      const playAnimation = React.useCallback(() => {
        if (typeof anime === 'undefined') return;
        
        cleanupAnimations();
        setAnimationState('playing');
        
        const data = buildVisualization(true); // Build with animation-ready styles
        if (!data) return;
        
        const { canvas } = data;
        const animations = [];
        
        // Get elements within THIS canvas only
        const pointEls = canvas.querySelectorAll('.point');
        const triangleEls = canvas.querySelectorAll('polygon.triangle');
        const edgeEls = canvas.querySelectorAll('.edge');
        
        // Create timeline
        const timeline = anime.timeline({
          easing: 'easeOutExpo',
          complete: () => setAnimationState('complete')
        });
        
        // Phase 1: Points drop in
        if (pointEls.length > 0) {
          timeline.add({
            targets: pointEls,
            opacity: [0, 1],
            scale: [0, 1],
            translateY: ['-30px', '0px'],
            delay: anime.stagger(50, { from: 'center' }),
            easing: 'easeOutElastic(1, .6)',
            duration: 800
          }, 0);
        }
        
        // Phase 2: Triangles fade in (using opacity for SVG polygons)
        if (triangleEls.length > 0) {
          // Adjust stagger based on triangle count for smooth animation
          const triStagger = Math.max(10, Math.min(40, 800 / triangleEls.length));
          timeline.add({
            targets: triangleEls,
            opacity: [0, 1],
            strokeDashoffset: [anime.setDashoffset, 0],
            delay: anime.stagger(triStagger, { from: 'center' }),
            duration: 600,
            easing: 'easeInOutQuad'
          }, 500);
        }
        
        // Phase 3: Edges draw in
        if (edgeEls.length > 0) {
          timeline.add({
            targets: edgeEls,
            opacity: [0, 1],
            scaleX: [0, 1],
            delay: anime.stagger(80),
            duration: 600,
            easing: 'easeInOutQuad'
          }, 1100);
        }
        
        // Phase 4: Points pulse
        if (pointEls.length > 0) {
          timeline.add({
            targets: pointEls,
            scale: [1, 1.4, 1],
            duration: 300,
            delay: anime.stagger(25),
            easing: 'easeInOutSine'
          }, 1700);
        }
        
        animations.push(timeline);
        setAnimationInstances(animations);
      }, [buildVisualization, cleanupAnimations]);
      
      // Reset to initial state (show static preview)
      const resetVisualization = React.useCallback(() => {
        cleanupAnimations();
        setAnimationState('idle');
        buildVisualization(false); // Static preview
      }, [cleanupAnimations, buildVisualization]);
      
      // Build initial visualization on mount (static preview)
      React.useEffect(() => {
        buildVisualization(false); // Static preview
        return () => cleanupAnimations();
      }, [points.length, triangles.length, isExpanded]);
      
      return (
        <div className="terrain-visualization">
          {onExpand && (
            <button className="chart-expand" onClick={onExpand} title="Expand TIN visualization">↗</button>
          )}
          <div className="terrain-viz-title">
            <span>△ TIN Construction Visualizer</span>
            <span style={{ fontSize: '8px', padding: '2px 4px', background: 'rgba(168,85,247,0.2)', color: 'var(--accent-purple)', borderRadius: '3px', marginLeft: '8px' }}>ANIME.JS</span>
          </div>
          <div style={{ fontSize: '10px', color: 'var(--text-muted)', marginBottom: '12px' }}>
            Watch how Delaunay triangulation builds the terrain mesh
          </div>
          
          <div className="tin-controls">
            <button 
              className={`tin-btn ${animationState === 'playing' ? 'active' : ''}`}
              onClick={playAnimation}
              disabled={animationState === 'playing'}
            >
              {animationState === 'idle' ? '▶ Animate' : animationState === 'playing' ? '● Playing...' : '▶ Replay'}
            </button>
            {animationState !== 'idle' && (
              <button className="tin-btn" onClick={resetVisualization}>
                ↺ Reset
              </button>
            )}
          </div>
          
          <div 
            ref={canvasRef} 
            className={`tin-canvas ${isExpanded ? 'expanded' : ''}`}
          ></div>
          
          <div className="tin-legend">
            <div className="tin-legend-item">
              <div className="tin-legend-dot" style={{ background: 'var(--accent-cyan)' }}></div>
              <span>Survey Points</span>
            </div>
            <div className="tin-legend-item">
              <div className="tin-legend-dot" style={{ background: 'var(--accent-purple)', opacity: 0.6 }}></div>
              <span>Triangles</span>
            </div>
            <div className="tin-legend-item">
              <div className="tin-legend-dot" style={{ background: 'var(--accent-orange)' }}></div>
              <span>Breaklines</span>
            </div>
          </div>
          
          <div className="tin-stats">
            <div className="tin-stat-box">
              <div className="tin-stat-value" style={{ color: 'var(--accent-cyan)' }}>{points.length}</div>
              <div className="tin-stat-label">Points</div>
            </div>
            <div className="tin-stat-box">
              <div className="tin-stat-value" style={{ color: 'var(--accent-purple)' }}>{triangles.length}</div>
              <div className="tin-stat-label">Triangles</div>
            </div>
            <div className="tin-stat-box">
              <div className="tin-stat-value" style={{ color: 'var(--accent-orange)' }}>{breakLines.length}</div>
              <div className="tin-stat-label">Breaklines</div>
            </div>
          </div>
          
          <div style={{ marginTop: '12px', fontSize: '9px', color: 'var(--text-muted)', textAlign: 'center', lineHeight: '1.4' }}>
            Advanced timeline • Elastic bouncing • Staggered morphing
          </div>
        </div>
      );
    }
    
    // Main App

      const [showStatDetails, setShowStatDetails] = useState(null); // which stat to show details for

      }, [points, breakLines, interval, majorInterval, smoothness]);
      
      // Fit to data
      const fitToData = useCallback(() => {
        if (points.length === 0) return;
        
        const allPts = [...points, ...breakLines.flatMap(b => b.points)];
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (const p of allPts) {
          minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
          minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
        }
        
        const wrapper = wrapperRef.current;
        if (!wrapper) return;
        
        const rect = wrapper.getBoundingClientRect();
        const pad = 80;
        const dataW = maxX - minX || 1;
        const dataH = maxY - minY || 1;
        const scaleX = (rect.width - pad * 2) / dataW;
        const scaleY = (rect.height - pad * 2) / dataH;
        
        setView({
          centerX: (minX + maxX) / 2,
          centerY: (minY + maxY) / 2,
          scale: Math.min(scaleX, scaleY)
        });

      // Canvas render
      useEffect(() => {
        const canvas = canvasRef.current;
        const wrapper = wrapperRef.current;
        if (!canvas || !wrapper) return;
        
        const dpr = window.devicePixelRatio || 1;
        const rect = wrapper.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return;
        
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        
        const ctx = canvas.getContext('2d');
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        ctx.fillStyle = '#0a0e14';
        ctx.fillRect(0, 0, rect.width, rect.height);
        
        const halfW = rect.width / 2, halfH = rect.height / 2;
        const toScreen = (wx, wy) => ({
          x: halfW + (wx - view.centerX) * view.scale,
          y: halfH - (wy - view.centerY) * view.scale
        });
        
        // Grid
        ctx.strokeStyle = '#1a2332';
        ctx.lineWidth = 1;
        const gridWorldSize = Math.pow(10, Math.floor(Math.log10(100 / view.scale)));
        const gridScreenSize = gridWorldSize * view.scale;
        
        if (gridScreenSize > 10) {
          const startWX = Math.floor((view.centerX - halfW / view.scale) / gridWorldSize) * gridWorldSize;
          const endWX = Math.ceil((view.centerX + halfW / view.scale) / gridWorldSize) * gridWorldSize;
          const startWY = Math.floor((view.centerY - halfH / view.scale) / gridWorldSize) * gridWorldSize;
          const endWY = Math.ceil((view.centerY + halfH / view.scale) / gridWorldSize) * gridWorldSize;
          
          for (let wx = startWX; wx <= endWX; wx += gridWorldSize) {
            const sx = toScreen(wx, 0).x;
            ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, rect.height); ctx.stroke();
          }
          for (let wy = startWY; wy <= endWY; wy += gridWorldSize) {
            const sy = toScreen(0, wy).y;
            ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(rect.width, sy); ctx.stroke();
          }
        }
        
        if (points.length === 0) {
          ctx.fillStyle = '#5c6370';
          ctx.font = '16px Outfit, system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText('Import survey data to begin', rect.width / 2, rect.height / 2);
          return;
        }
        
        // TIN
        if (showTIN && triangles.length > 0) {
          ctx.strokeStyle = 'rgba(99,102,241,0.3)';
          ctx.lineWidth = 0.5;
          for (const tri of triangles) {
            const p1 = toScreen(tri.p1.x, tri.p1.y);
            const p2 = toScreen(tri.p2.x, tri.p2.y);
            const p3 = toScreen(tri.p3.x, tri.p3.y);
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y);
            ctx.closePath(); ctx.stroke();
          }
        }
        
        // Breaklines
        if (showBreakLines) {
          for (const bl of breakLines) {
            if (bl.points.length < 2) continue;
            ctx.strokeStyle = '#ff6b35';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([8, 4]);
            ctx.beginPath();
            const first = toScreen(bl.points[0].x, bl.points[0].y);
            ctx.moveTo(first.x, first.y);
            for (let i = 1; i < bl.points.length; i++) {
              const pt = toScreen(bl.points[i].x, bl.points[i].y);
              ctx.lineTo(pt.x, pt.y);
            }
            ctx.stroke();
            ctx.setLineDash([]);
            
            for (const pt of bl.points) {
              const sp = toScreen(pt.x, pt.y);
              ctx.fillStyle = '#ff6b35';
              ctx.beginPath(); ctx.arc(sp.x, sp.y, 4, 0, Math.PI * 2); ctx.fill();
            }
          }
        }
        
        // Current drawing breakline
        if (drawMode && currentBreakline.length > 0) {
          ctx.strokeStyle = '#ff6b35';
          ctx.lineWidth = 3;
          ctx.setLineDash([5, 5]);
          ctx.beginPath();
          const first = toScreen(currentBreakline[0].x, currentBreakline[0].y);
          ctx.moveTo(first.x, first.y);
          for (let i = 1; i < currentBreakline.length; i++) {
            const pt = toScreen(currentBreakline[i].x, currentBreakline[i].y);
            ctx.lineTo(pt.x, pt.y);
          }
          ctx.stroke();
          ctx.setLineDash([]);
          
          // Draw points with RL labels
          for (let i = 0; i < currentBreakline.length; i++) {
            const pt = currentBreakline[i];
            const sp = toScreen(pt.x, pt.y);
            
            // Point marker
            ctx.fillStyle = '#ffd93d';
            ctx.beginPath(); ctx.arc(sp.x, sp.y, 7, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ff6b35';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Point number
            ctx.fillStyle = '#0a0e14';
            ctx.font = 'bold 10px JetBrains Mono, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(i + 1), sp.x, sp.y);
            
            // RL label
            ctx.fillStyle = '#00ff88';
            ctx.font = '10px JetBrains Mono, monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            ctx.fillText(`RL ${pt.z.toFixed(2)}`, sp.x + 10, sp.y - 4);
          }
        }
        
        // Contours

              const dot02 = v0x * v2x + v0y * v2y;
              const dot11 = v1x * v1x + v1y * v1y;

      // Convert ImageData to BMP format
      const convertToBMP = (imageData) => {
        const width = imageData.width;
        const height = imageData.height;
        const data = imageData.data;
        
        // BMP requires rows to be padded to multiples of 4 bytes
        const rowPadding = (4 - ((width * 3) % 4)) % 4;
        const pixelDataSize = (width * 3 + rowPadding) * height;
        const fileSize = 54 + pixelDataSize; // 54 = BMP header size
        
        const buffer = new ArrayBuffer(fileSize);
        const view = new DataView(buffer);
        
        // BMP Header
        view.setUint16(0, 0x4D42, true); // "BM"
        view.setUint32(2, fileSize, true);
        view.setUint32(6, 0, true); // Reserved
        view.setUint32(10, 54, true); // Pixel data offset
        
        // DIB Header (BITMAPINFOHEADER)
        view.setUint32(14, 40, true); // Header size
        view.setInt32(18, width, true);
        view.setInt32(22, -height, true); // Negative for top-down
        view.setUint16(26, 1, true); // Color planes
        view.setUint16(28, 24, true); // Bits per pixel
        view.setUint32(30, 0, true); // Compression (none)
        view.setUint32(34, pixelDataSize, true);
        view.setInt32(38, 2835, true); // X pixels per meter (72 DPI)
        view.setInt32(42, 2835, true); // Y pixels per meter
        view.setUint32(46, 0, true); // Colors in palette
        view.setUint32(50, 0, true); // Important colors
        
        // Pixel data (BGR format, bottom to top)
        let offset = 54;
        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            const i = (y * width + x) * 4;
            view.setUint8(offset++, data[i + 2]); // B
            view.setUint8(offset++, data[i + 1]); // G
            view.setUint8(offset++, data[i + 0]); // R
          }
          // Row padding
          for (let p = 0; p < rowPadding; p++) {
            view.setUint8(offset++, 0);
          }
        }
        
        return buffer;
      };

                      distance: 15
                    },
                    states: {
                      hover: { brightness: 0.1, halo: { size: 8 } }
                    }
                  } 
                },
                series: [{ 
                  name: 'Slope',
                  data: [
                    { name: 'Flat (0-5°)', y: bins['Flat (0-5°)'], color: '#00ff88' },
                    { name: 'Gentle (5-15°)', y: bins['Gentle (5-15°)'], color: '#00d9ff' },
                    { name: 'Moderate (15-30°)', y: bins['Moderate (15-30°)'], color: '#ffd93d' },
                    { name: 'Steep (30-45°)', y: bins['Steep (30-45°)'], color: '#ff6b35' },
                    { name: 'Extreme (>45°)', y: bins['Extreme (>45°)'], color: '#ff4757' }
                  ].filter(d => d.y > 0)
                }],
                credits: { enabled: false },
                exporting: { enabled: false }
              });
            }
          }, 100);
        }
      }, [activeTab, terrainStats, points, triangles]);
      
      // Render expanded chart in modal
      const renderExpandedChart = useCallback((chartType) => {
        setTimeout(() => {
          if (chartType === 'elevation' && document.getElementById('expanded-chart') && points.length > 0) {
            const elevData = points.map((p, i) => ({ x: i, y: p.z, name: p.borehole })).sort((a, b) => a.y - b.y);
            const minEl = Math.min(...elevData.map(d => d.y));
            const maxEl = Math.max(...elevData.map(d => d.y));
            
            Highcharts.chart('expanded-chart', {
              chart: { type: 'areaspline', backgroundColor: 'transparent', height: 400, style: { fontFamily: 'Outfit, system-ui, sans-serif' } },
              title: { text: 'Elevation Profile (Sorted)', style: { color: '#e8eaed', fontSize: '16px' } },
              subtitle: { text: `${points.length} survey points | Range: ${(maxEl - minEl).toFixed(2)}m`, style: { color: '#8b949e' } },
              xAxis: { 
                title: { text: 'Point Index (sorted by elevation)', style: { color: '#8b949e', fontSize: '12px' } },
                labels: { style: { color: '#8b949e', fontSize: '10px' } },
                gridLineColor: '#2d3748',
                gridLineWidth: 1
              },
              yAxis: { 
                title: { text: 'Elevation (m)', style: { color: '#8b949e', fontSize: '12px' } }, 
                labels: { style: { color: '#8b949e', fontSize: '10px' }, format: '{value:.2f}' }, 
                gridLineColor: '#2d3748',
                plotLines: [{
                  value: (minEl + maxEl) / 2,
                  color: '#a855f7',
                  dashStyle: 'dash',
                  width: 1,
                  label: { text: 'Mean', style: { color: '#a855f7', fontSize: '10px' } }
                }]
              },
              legend: { enabled: false },
              tooltip: {
                backgroundColor: 'rgba(17,24,32,0.95)',
                borderColor: '#2d3748',
                style: { color: '#e8eaed', fontSize: '12px' },
                formatter: function() { return `<b>${this.point.name}</b><br/>Elevation: <b>${this.y.toFixed(3)} m</b>`; }
              },
              plotOptions: { 
                areaspline: { 
                  fillColor: { linearGradient: { x1: 0, y1: 0, x2: 0, y2: 1 }, stops: [[0, 'rgba(0,217,255,0.6)'], [0.5, 'rgba(0,217,255,0.2)'], [1, 'rgba(0,217,255,0)']] },
                  lineWidth: 2,
                  marker: { enabled: elevData.length < 50, radius: 4, fillColor: '#00d9ff', lineWidth: 2, lineColor: '#0a0e14' }
                } 
              },
              series: [{ data: elevData.map(d => ({ y: d.y, name: d.name })), color: '#00d9ff', name: 'Elevation' }],
              credits: { enabled: false },
              exporting: { enabled: false }
            });
          }
          
          if (chartType === 'slope' && document.getElementById('expanded-chart') && triangles.length > 0) {
            const slopes = triangles.map(tri => {
              const dx1 = tri.p2.x - tri.p1.x, dy1 = tri.p2.y - tri.p1.y, dz1 = tri.p2.z - tri.p1.z;
              const dx2 = tri.p3.x - tri.p1.x, dy2 = tri.p3.y - tri.p1.y, dz2 = tri.p3.z - tri.p1.z;
              const dist1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);
              const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
              return Math.max(
                dist1 > 0 ? Math.atan(Math.abs(dz1 / dist1)) * (180 / Math.PI) : 0,
                dist2 > 0 ? Math.atan(Math.abs(dz2 / dist2)) * (180 / Math.PI) : 0
              );
            });
            
            const bins = { 'Flat (0-5°)': 0, 'Gentle (5-15°)': 0, 'Moderate (15-30°)': 0, 'Steep (30-45°)': 0, 'Extreme (>45°)': 0 };
            slopes.forEach(s => {
              if (s < 5) bins['Flat (0-5°)']++;
              else if (s < 15) bins['Gentle (5-15°)']++;
              else if (s < 30) bins['Moderate (15-30°)']++;
              else if (s < 45) bins['Steep (30-45°)']++;
              else bins['Extreme (>45°)']++;
            });
            
            const total = slopes.length;
            const avgSlope = slopes.reduce((a, b) => a + b, 0) / slopes.length;
            const maxSlope = Math.max(...slopes);
            const minSlope = Math.min(...slopes);
            
            Highcharts.chart('expanded-chart', {
              chart: { type: 'pie', backgroundColor: 'transparent', height: 420, style: { fontFamily: 'Outfit, system-ui, sans-serif' } },
              title: { text: 'Slope Distribution Analysis', style: { color: '#e8eaed', fontSize: '18px', fontWeight: '600' } },
              subtitle: { text: `${total} triangles analyzed | Avg: ${avgSlope.toFixed(1)}° | Min: ${minSlope.toFixed(1)}° | Max: ${maxSlope.toFixed(1)}°`, style: { color: '#8b949e', fontSize: '12px' } },
              tooltip: {
                backgroundColor: 'rgba(17,24,32,0.95)',
                borderColor: '#2d3748',
                borderRadius: 8,
                style: { color: '#e8eaed', fontSize: '13px' },
                formatter: function() { 
                  const pct = ((this.y / total) * 100).toFixed(1);
                  const desc = {
                    'Flat (0-5°)': 'Nearly level terrain, ideal for construction',
                    'Gentle (5-15°)': 'Slight incline, good drainage',
                    'Moderate (15-30°)': 'Noticeable slope, may need grading',
                    'Steep (30-45°)': 'Significant grade, erosion risk',
                    'Extreme (>45°)': 'Very steep, stability concerns'
                  }[this.point.name] || '';
                  return `<b style="font-size:14px">${this.point.name}</b><br/>` +
                         `<span style="color:#8b949e">Count:</span> <b>${this.y}</b> triangles<br/>` +
                         `<span style="color:#8b949e">Percentage:</span> <b>${pct}%</b><br/>` +
                         `<span style="color:#5c6370;font-size:11px">${desc}</span>`; 
                }
              },
              plotOptions: { 
                pie: { 
                  innerSize: '50%',
                  size: '85%',
                  borderWidth: 3,
                  borderColor: '#0a0e14',
                  shadow: { color: 'rgba(0,0,0,0.3)', offsetX: 2, offsetY: 2, width: 5 },
                  dataLabels: { 
                    enabled: true, 
                    format: '<b>{point.name}</b><br/>{point.y} ({point.percentage:.1f}%)', 
                    style: { color: '#e8eaed', fontSize: '11px', textOutline: '2px #0a0e14', fontWeight: '500' },
                    distance: 25,
                    connectorColor: '#5c6370',
                    connectorWidth: 1
                  },
                  states: {
                    hover: { brightness: 0.15, halo: { size: 12, opacity: 0.25 } }
                  },
                  point: {
                    events: {
                      mouseOver: function() { this.graphic.animate({ r: this.shapeArgs.r + 5 }, { duration: 150 }); },
                      mouseOut: function() { this.graphic.animate({ r: this.shapeArgs.r }, { duration: 150 }); }
                    }
                  }
                } 
              },
              series: [{ 
                name: 'Slope',
                data: [
                  { name: 'Flat (0-5°)', y: bins['Flat (0-5°)'], color: { linearGradient: { x1: 0, y1: 0, x2: 1, y2: 1 }, stops: [[0, '#00ff88'], [1, '#00cc6a']] } },
                  { name: 'Gentle (5-15°)', y: bins['Gentle (5-15°)'], color: { linearGradient: { x1: 0, y1: 0, x2: 1, y2: 1 }, stops: [[0, '#00d9ff'], [1, '#0099cc']] } },
                  { name: 'Moderate (15-30°)', y: bins['Moderate (15-30°)'], color: { linearGradient: { x1: 0, y1: 0, x2: 1, y2: 1 }, stops: [[0, '#ffd93d'], [1, '#e6b800']] } },
                  { name: 'Steep (30-45°)', y: bins['Steep (30-45°)'], color: { linearGradient: { x1: 0, y1: 0, x2: 1, y2: 1 }, stops: [[0, '#ff6b35'], [1, '#cc4400']] } },
                  { name: 'Extreme (>45°)', y: bins['Extreme (>45°)'], color: { linearGradient: { x1: 0, y1: 0, x2: 1, y2: 1 }, stops: [[0, '#ff4757'], [1, '#cc2233']] } }
                ].filter(d => d.y > 0)
              }],
              credits: { enabled: false },
              exporting: { enabled: false }
            });
          }
        }, 100);
      }, [points, triangles, terrainStats]);
      
      useEffect(() => {
        if (expandedChart) {
          renderExpandedChart(expandedChart);
        }
      }, [expandedChart, renderExpandedChart]);
      
      const stats = useMemo(() => {
        if (points.length === 0) return { minZ: 0, maxZ: 0 };
        const allZ = points.map(p => p.z);
        return { minZ: Math.min(...allZ), maxZ: Math.max(...allZ) };
      }, [points]);
      
      const smartSummary = useMemo(() => {
        return generateSmartSummary(terrainStats, points, breakLines, contours);
      }, [terrainStats, points, breakLines, contours]);
      
      const getTerrainBadgeClass = (type) => ({ flat: 'terrain-flat', gentle: 'terrain-gentle', moderate: 'terrain-moderate', steep: 'terrain-steep', extreme: 'terrain-extreme' }[type] || 'terrain-flat');
      
      return (

              <div className="logo-icon">⬡</div>
              <div className="logo-text">Contour<span>Gen</span></div>
              <span style={{ fontSize: '9px', color: 'var(--text-muted)', marginLeft: '6px', display: 'none' }} className="version-text">v{BUILD_INFO.appVersion}</span>
            </div>
            <div className="header-actions">

          <div className="main">

                          <div className="stat-value cyan">{points.length}</div>
                          <div className="stat-label">Boreholes</div>
                        </div>
                        <div className="stat-card" onClick={() => setShowStatDetails('breaklines')}>
                          <div className="stat-value orange">{breakLines.length}</div>
                          <div className="stat-label">Breaklines</div>
                        </div>
                        <div className="stat-card" onClick={() => setShowStatDetails('triangles')}>
                          <div className="stat-value purple">{triangles.length}</div>
                          <div className="stat-label">Triangles</div>
                        </div>
                        <div className="stat-card" onClick={() => setShowStatDetails('contours')}>
                          <div className="stat-value green">{contours.length}</div>
                          <div className="stat-label">Contours</div>
                        </div>
                      </div>
                      {points.length > 0 && stats && !isNaN(stats.minZ) && !isNaN(stats.maxZ) && (
                        <div style={{ marginTop: '12px', fontSize: '12px', color: 'var(--text-secondary)' }}>
                          RL Range: <span style={{ color: 'var(--accent-cyan)' }}>{stats.minZ.toFixed(2)}</span> → <span style={{ color: 'var(--accent-green)' }}>{stats.maxZ.toFixed(2)}</span>
                        </div>
                      )}
                    </div>
                    
                    {points.length > 0 && (
                      <div className="panel-section">
                        <div className="panel-title">Boreholes ({points.length})</div>
                        <div className="data-list" style={{ maxHeight: showAllBoreholes ? 'none' : '180px' }}>
                          {(showAllBoreholes ? points : points.slice(0, 10)).map((pt, i) => (

                  </>

                {activeTab === 'settings' && (

                              const num = parseFloat(val);
                              if (!isNaN(num) && num > 0) {
                                setIntervalVal(num);
                              }
                            }
                          }}
                          onBlur={() => {
                            if (interval === '' || isNaN(interval) || interval <= 0) {
                              setIntervalVal(1.0);
                            }
                          }}
                          step="0.5" 
                          min="0.1"
                          placeholder="1.0"
                        />
                      </div>
                      <div className="input-group">
                        <label className="input-label">Major Contour Every</label>
                        <input type="number" className="input-field" value={majorInterval} onChange={(e) => setMajorInterval(Math.max(1, parseInt(e.target.value) || 1))} min="1" />
                        <div style={{ fontSize: '11px', color: 'var(--text-muted)', marginTop: '4px' }}>Major every {(interval * majorInterval).toFixed(1)}m</div>

                      </div>
                    </div>
                    
                    <div className="panel-section">

                              <div style={{ marginTop: '8px', padding: '8px', background: 'rgba(0,0,0,0.2)', borderRadius: '4px' }}>

                    {expandedChart === 'tin' && '△ TIN Construction Visualizer'}
                  </div>
                  <button className="chart-modal-close" onClick={() => setExpandedChart(null)}>×</button>
                </div>
                <div className="chart-modal-body">
                  {expandedChart === 'tin' ? (
                    <TINVisualizer 
                      points={points}
                      triangles={triangles}
                      breakLines={breakLines}
                      isExpanded={true}
                      onExpand={null}
                    />
                  ) : (
                    <div id="expanded-chart" style={{ minHeight: '400px' }}></div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    // Check if boot failed or critical libraries missing
    function initializeApp() {
      if (window.bootFailed) {
        console.error('Boot failed - app will not initialize');
        return;
      }
      if (typeof XLSX === 'undefined') {
        if (typeof showBootError === 'function') {
          showBootError('SheetJS (Excel) library not loaded', 'Required for Excel file processing. Please refresh or use offline version.');
          updateBootStep('xlsx', 'error');
        } else {
          alert('Error: SheetJS library failed to load. Please refresh the page.');
        }
        return;
      }
      if (typeof Highcharts === 'undefined') {
        if (typeof showBootError === 'function') {
          showBootError('Highcharts library not loaded', 'Required for charts. Please refresh or use offline version.');
          updateBootStep('highcharts', 'error');
        } else {
          alert('Error: Highcharts library failed to load. Please refresh the page.');
        }
        return;
      }
      
      if (typeof updateBootStep === 'function') updateBootStep('app', 'done');
      if (typeof hideBootScreen === 'function') setTimeout(hideBootScreen, 300);
      const root = ReactDOM.createRoot(document.getElementById('app'));
      root.render(<App />);
    }
    
    // Check if we're in offline mode (no external CDN scripts)
    const isOfflineMode = !document.querySelector('script[src*="unpkg.com"], script[src*="cdn."]');
    
    // In offline mode, libs are loaded synchronously - initialize immediately
    // In online mode, wait for the boot tracking system
    if (isOfflineMode || window.allLibsReady) {
      initializeApp();
    } else {
      window.initAppWhenReady = initializeApp;
    }
  </script>
</body>
</html>
